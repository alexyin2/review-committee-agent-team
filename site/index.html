<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Committee — CAB Workbench</title>
<style>
  :root {
    --terracotta: #c9694a; --terracotta-soft: #d98c6f;
    --paper: #faf7f2; --paper-card: #ffffff; --sidebar: #f3ede4;
    --ink: #2b2724; --ink-soft: #6b635c; --hairline: #e8e1d8;
    --green: #4f9d77; --green-bg: #e9f3ec; --amber: #c98a2b; --amber-bg: #f8efe0;
    --red: #c0473a; --red-bg: #f8e7e4; --blocker: #b23b34;
    --serif: "Iowan Old Style","Palatino Linotype","Georgia",serif;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    --mono: "SF Mono","JetBrains Mono","Menlo",monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--terracotta); font-family: var(--sans); color: var(--ink); min-height: 100vh; padding: 24px; }
  .app { background: var(--paper); border-radius: 18px; max-width: 1280px; margin: 0 auto;
         min-height: calc(100vh - 48px); box-shadow: 0 30px 80px rgba(0,0,0,.22); overflow: hidden;
         display: grid; grid-template-columns: 232px 1fr; }
  aside { background: var(--sidebar); border-right: 1px solid var(--hairline); padding: 22px 16px; }
  .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; padding: 0 6px; }
  .brand .logo { width: 36px; height: 36px; border-radius: 9px; background: var(--terracotta); color: #fff;
                 display: grid; place-items: center; font-weight: 700; font-size: 14px; }
  .brand .name { font-family: var(--serif); font-size: 15.5px; line-height: 1.1; }
  .brand .sub { font-size: 10px; letter-spacing: .12em; color: var(--ink-soft); text-transform: uppercase; }
  .nav-group { margin-bottom: 18px; }
  .nav-group .gl { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); padding: 0 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13.5px;
              color: var(--ink-soft); cursor: pointer; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(0,0,0,.04); color: var(--ink); }
  .nav-item.active { background: var(--paper-card); color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .nav-item .ic { width: 16px; text-align: center; }
  .nav-item .badge { margin-left: auto; background: var(--terracotta); color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 7px; }
  aside .foot { margin-top: 24px; padding: 12px 10px 0; border-top: 1px solid var(--hairline); font-size: 11px; color: var(--ink-soft); line-height: 1.5; }
  aside .pub-tag { display:inline-block; margin-top:8px; font-size:10px; background:var(--amber-bg); color:var(--amber); border-radius:6px; padding:2px 7px; }

  main { padding: 26px 32px 40px; overflow-y: auto; }
  .crumbs { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px; }
  .crumbs a { color: var(--ink-soft); text-decoration: none; cursor: pointer; }
  .crumbs a:hover { color: var(--terracotta); }
  .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
  .page-title { font-family: var(--serif); font-size: 28px; line-height: 1.12; }
  .page-meta { font-size: 12.5px; color: var(--ink-soft); margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .page-meta b { color: var(--ink); font-weight: 600; }

  .context-bar { border: 1px solid var(--hairline); border-radius: 12px; background: var(--paper-card);
                 padding: 11px 16px; margin-bottom: 20px; font-size: 12.5px; color: var(--ink-soft);
                 display: flex; gap: 20px; flex-wrap: wrap; }
  .context-bar b { color: var(--ink); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(258px,1fr)); gap: 16px; }
  .card { border: 1px solid var(--hairline); border-radius: 14px; background: var(--paper-card); padding: 18px;
          cursor: pointer; transition: transform .12s, box-shadow .12s, border-color .12s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(0,0,0,.08); border-color: var(--terracotta-soft); }

  .pill { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; }
  .pill .sdot { width: 8px; height: 8px; border-radius: 50%; }
  .pill.awaiting { color: var(--amber); } .pill.awaiting .sdot { background: var(--amber); }
  .pill.decided { color: var(--green); } .pill.decided .sdot { background: var(--green); }
  .ctitle { font-family: var(--serif); font-size: 18px; margin-bottom: 3px; }
  .csub { font-size: 12px; color: var(--ink-soft); margin-bottom: 13px; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--hairline);
               padding-top: 12px; margin-top: 4px; font-size: 12px; }
  .verdict-tag { font-weight: 600; }
  .verdict-tag.nogo { color: var(--red); } .verdict-tag.go { color: var(--green); } .verdict-tag.conditional-go { color: var(--amber); } .verdict-tag.unknown,.verdict-tag.pending { color: var(--ink-soft); }
  .open-link { color: var(--terracotta); }
  .demo-tag { font-size: 9px; letter-spacing: .08em; background: #ece4d6; color: var(--ink-soft); border-radius: 4px; padding: 2px 6px; text-transform: uppercase; }

  .sev-row { display: flex; gap: 6px; margin-bottom: 13px; flex-wrap: wrap; }
  .sev-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-variant-numeric: tabular-nums; }
  .sev-chip.blocker { background: var(--red-bg); color: var(--blocker); font-weight: 600; }
  .sev-chip.high { background: var(--amber-bg); color: var(--amber); }
  .sev-chip.medium { background: #f0ece5; color: var(--ink-soft); }
  .sev-chip.low,.sev-chip.info { background: #f0ece5; color: var(--ink-soft); }
  .sev-chip.zero { opacity: .35; }

  /* CAB 兩道關卡 */
  .cab-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px){ .cab-row { grid-template-columns: 1fr; } }
  .cab-card { border: 1px solid var(--hairline); border-radius: 14px; background: var(--paper-card); padding: 18px; cursor: pointer; transition: transform .12s, box-shadow .12s, border-color .12s; }
  .cab-card:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(0,0,0,.08); border-color: var(--terracotta-soft); }
  .cab-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .cab-name { font-family: var(--serif); font-size: 20px; }
  .cab-env { font-size: 11px; letter-spacing: .1em; color: var(--ink-soft); border: 1px solid var(--hairline); border-radius: 12px; padding: 2px 9px; }
  .cab-desc { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }

  /* workflow 步驟條 */
  .workflow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border: 1px solid var(--hairline);
              border-radius: 12px; background: var(--paper-card); padding: 12px 16px; margin-bottom: 16px; font-size: 12.5px; }
  .workflow.mini { border: none; background: transparent; padding: 6px 0; margin-bottom: 10px; }
  .workflow .wf-label { letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); font-size: 10.5px; margin-right: 6px; }
  .wf-step { display: inline-flex; align-items: center; gap: 7px; color: var(--ink-soft); cursor: pointer; }
  .wf-step .dot { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; font-size: 10px; border: 1px solid var(--hairline); }
  .wf-step.done .dot { background: var(--green); color: #fff; border-color: var(--green); }
  .wf-step.active .dot { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }
  .wf-step.active { color: var(--ink); font-weight: 600; }
  .wf-arrow { color: var(--hairline); }

  .subtabs { display: flex; gap: 4px; border-bottom: 1px solid var(--hairline); margin-bottom: 18px; flex-wrap: wrap; }
  .subtab { padding: 9px 16px; font-size: 13.5px; color: var(--ink-soft); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .subtab:hover { color: var(--ink); }
  .subtab.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--terracotta); }
  .subtab .cnt { font-size: 11px; color: var(--ink-soft); margin-left: 5px; }

  .panel { border: 1px solid var(--hairline); border-radius: 14px; background: var(--paper-card); overflow: hidden; margin-bottom: 18px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--hairline); }
  .panel-head .ptitle { font-family: var(--serif); font-size: 16px; }
  .panel-head .pmeta { font-size: 11px; color: var(--ink-soft); font-family: var(--mono); }

  .finding { padding: 14px 18px; border-bottom: 1px solid var(--hairline); }
  .finding:last-child { border-bottom: none; }
  .finding-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .sev-badge { font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; font-weight: 600; }
  .sev-badge.blocker { background: var(--blocker); color: #fff; } .sev-badge.high { background: var(--amber); color: #fff; }
  .sev-badge.medium { background: #ccc4b8; color: #fff; } .sev-badge.low, .sev-badge.info { background: #ddd6cb; color: var(--ink-soft); }
  .dept-chip { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: var(--paper); border: 1px solid var(--hairline); color: var(--ink-soft); }
  .finding .fid { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }
  .finding .ftitle { font-size: 14.5px; font-weight: 600; flex: 1; }
  .finding .frationale { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 8px; }
  .finding .frec { font-size: 12.5px; line-height: 1.55; margin-bottom: 8px; } .finding .frec b { color: var(--terracotta); }
  .evidence { background: var(--paper); border: 1px solid var(--hairline); border-left: 3px solid var(--terracotta-soft);
              border-radius: 6px; padding: 8px 11px; font-size: 12px; color: var(--ink-soft); display: flex; gap: 8px; align-items: flex-start; }
  .evidence .doc { font-family: var(--mono); font-size: 10.5px; color: var(--terracotta); white-space: nowrap; }
  .evidence.missing { border-left-color: #bbb; }
  .rubric-ref { font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); margin-left: auto; }

  /* 審核會議 — 部門意見卡 */
  .dept-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; }
  .dept-card { border: 1px solid var(--hairline); border-radius: 12px; background: var(--paper-card); padding: 16px; }
  .dept-card .dh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .dept-card .dname { font-family: var(--serif); font-size: 17px; }
  .dept-card .dfull { font-size: 11px; color: var(--ink-soft); margin-bottom: 12px; }
  .advice { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
  .advice.nogo { background: var(--red-bg); color: var(--red); } .advice.go { background: var(--green-bg); color: var(--green); }
  .advice.conditional-go { background: var(--amber-bg); color: var(--amber); } .advice.pending { background: #efeae2; color: var(--ink-soft); }
  .dept-finding { font-size: 12.5px; color: var(--ink); padding: 7px 0; border-top: 1px dashed var(--hairline); display: flex; gap: 8px; }
  .dept-finding .sb { font-size: 9px; padding: 2px 6px; border-radius: 4px; height: fit-content; }
  .agent-note { font-size: 11px; color: var(--ink-soft); background: var(--paper); border-radius: 8px; padding: 8px 10px; margin-top: 10px; line-height: 1.5; }
  .skeleton-note { font-size: 12px; color: var(--ink-soft); font-style: italic; }

  /* 文件 / 提案 / 會議記錄 */
  .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--hairline); font-size: 13px; cursor: pointer; }
  .doc-row:last-child { border-bottom: none; } .doc-row:hover { background: var(--paper); }
  .doc-row .di { width: 30px; height: 30px; border-radius: 7px; background: var(--paper); display: grid; place-items: center; }
  .doc-row .dmeta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-soft); display:flex; gap:8px; align-items:center;}
  .empty-state { padding: 22px 18px; font-size: 13px; color: var(--ink-soft); line-height: 1.6; }
  .minutes { padding: 16px 18px; }
  .minutes .mhead { font-family: var(--serif); font-size: 20px; margin-bottom: 6px; }
  .minutes .mrule { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; background: var(--paper); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; }
  .minutes-link { display:inline-flex; gap:8px; align-items:center; font-size: 12.5px; color: var(--terracotta); text-decoration:none; border:1px solid var(--terracotta-soft); border-radius: 20px; padding: 8px 14px; margin-right:8px; }
  .minutes-link:hover { background: var(--paper); }

  .skill-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .skill-table th { text-align: left; font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); padding: 8px 18px; border-bottom: 1px solid var(--hairline); font-weight: 600; }
  .skill-table td { padding: 11px 18px; border-bottom: 1px solid var(--hairline); }
  .skill-table tr:last-child td { border-bottom: none; }
  .skill-table .sname { font-weight: 600; } .skill-table .spath { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); } .skill-table .schange { font-size: 11.5px; color: var(--ink-soft); }
  .lens-state { font-size: 10px; padding: 2px 8px; border-radius: 12px; }
  .lens-state.on { background: var(--green-bg); color: var(--green); } .lens-state.off { background: #efeae2; color: var(--ink-soft); }

  .sched-card { border: 1px solid var(--hairline); border-radius: 14px; background: var(--paper-card); padding: 16px 18px; display: flex; gap: 14px; align-items: flex-start; }
  .sched-card .si { width: 38px; height: 38px; border-radius: 9px; background: var(--paper); display: grid; place-items: center; font-size: 17px; flex-shrink: 0; }
  .sched-main { flex: 1; } .sched-main .st { font-family: var(--serif); font-size: 16px; } .sched-main .sd { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; line-height: 1.5; }
  .sched-state { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 12px; }
  .sched-state.implemented { background: var(--green-bg); color: var(--green); } .sched-state.skeleton { background: #efeae2; color: var(--ink-soft); }

  .readonly-banner { background: var(--amber-bg); color: var(--amber); border-radius: 10px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px; line-height:1.5; }
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="logo">RC</div>
      <div><div class="name">Review Committee</div><div class="sub">CAB Workbench</div></div>
    </div>
    <div class="nav-group">
      <div class="gl">運作</div>
      <div class="nav-item" data-view="projects"><span class="ic">▤</span> 專案 <span class="badge" id="nav-open"></span></div>
      <div class="nav-item" data-view="schedule"><span class="ic">◷</span> 排程</div>
    </div>
    <div class="nav-group">
      <div class="gl">治理</div>
      <div class="nav-item" data-view="skills"><span class="ic">◈</span> Skills / 腦</div>
    </div>
    <div class="foot">
      Agent 給推薦,人做裁決。<br>裁決發生在 CAB 審核會議。
      <span class="pub-tag" id="pub-tag" style="display:none">公開展示版(唯讀)</span>
    </div>
  </aside>
  <main id="view"></main>
</div>

<script src="data.js"></script>
<script>
const D = window.REVIEW_DATA;
const PUBLIC = !!D.public_mode;
const VLABEL = { "no-go":"NO-GO","go":"GO","conditional-go":"帶條件 GO","pending":"待審","unknown":"—" };
const VCLASS = { "no-go":"nogo","go":"go","conditional-go":"conditional-go","pending":"pending","unknown":"unknown" };
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function caseById(id){ return D.cases.find(c=>c.case_id===id); }
function projectById(id){ return D.projects.find(p=>p.project_id===id); }
function reviewsOf(pid){ return D.cases.filter(c=>c.project_id===pid); }
// 一個專案目前用第一個 case 當「本輪 CAB」(每專案一輪 CAB1+CAB2)
function caseOfProject(pid){ return reviewsOf(pid)[0]; }
function setNav(v){ document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active", n.dataset.view===v)); }

/* ════ 專案牌牆 ════ */
function viewProjects(){
  setNav("projects");
  const cards = D.projects.map(p=>{
    const c = caseOfProject(p.project_id);
    const cabBadges = (c?c.cabs:[]).map(cab=>`<span class="sev-chip ${cab.verdict==='no-go'?'blocker':cab.verdict==='conditional-go'?'high':'medium'}">${cab.id} ${VLABEL[cab.verdict]}</span>`).join("");
    return `<div class="card" onclick="viewProject('${p.project_id}')">
      <div class="pill ${p.open_count?'awaiting':'decided'}"><span class="sdot"></span>${p.open_count?p.open_count+' 待裁決':'全部已裁決'}</div>
      <div class="ctitle" style="margin-top:10px">${esc(p.project_name)}</div>
      <div class="csub">CAB1(UT) · CAB2(PROD)</div>
      <div class="sev-row">${cabBadges}</div>
      <div class="card-foot"><span class="verdict-tag ${VCLASS[p.latest_verdict]}">累計 ${p.total_blockers} blocker</span><span class="open-link">Open →</span></div>
    </div>`;
  }).join("");
  document.getElementById("view").innerHTML = `
    <div class="crumbs">運作 › <b>專案</b></div>
    <div class="page-head"><div><div class="page-title">專案</div>
      <div class="page-meta"><span>每個專案經 CAB1(UT)→ CAB2(PROD)兩道審查關卡</span></div></div></div>
    <div class="context-bar">
      <span>專案 <b>${D.summary.total_projects}</b></span>
      <span>待裁決 <b>${D.summary.awaiting}</b></span>
      <span>已裁決 <b>${D.summary.decided}</b></span>
      <span>部門:<b>${(D.departments||[]).map(d=>d.name).join(' / ')}</b></span>
    </div>
    <div class="grid">${cards}</div>`;
}

/* ════ 單一專案 → CAB1 / CAB2 兩道關卡 ════ */
function viewProject(pid){
  const p = projectById(pid); const c = caseOfProject(pid);
  const cabCards = (c?c.cabs:[]).map(cab=>{
    const deptLine = cab.dept_view.map(dv=>`<span class="advice ${VCLASS[dv.advice]}" style="margin-right:6px">${dv.name} ${VLABEL[dv.advice]}</span>`).join("");
    const wf = cab.workflow.map((s,i)=>`<span class="wf-step ${cab.reviewed?'done':''}"><span class="dot">${cab.reviewed?'✓':i+1}</span>${s}</span>${i<cab.workflow.length-1?'<span class="wf-arrow">›</span>':''}`).join("");
    return `<div class="cab-card" onclick="viewCab('${c.case_id}','${cab.id}')">
      <div class="cab-head"><span class="cab-name">${cab.name}</span><span class="cab-env">${cab.env} 環境</span></div>
      <div class="cab-desc">${esc(cab.desc)}</div>
      <div class="workflow mini">${wf}</div>
      <div style="margin:10px 0">${deptLine}</div>
      <div class="card-foot"><span class="verdict-tag ${VCLASS[cab.verdict]}">本關推薦 ${VLABEL[cab.verdict]}</span><span class="open-link">進入 →</span></div>
    </div>`;
  }).join("");
  document.getElementById("view").innerHTML = `
    <div class="crumbs"><a onclick="viewProjects()">專案</a> › <b>${esc(p.project_name)}</b></div>
    <div class="page-head"><div><div class="page-title">${esc(p.project_name)}</div>
      <div class="page-meta"><span>本輪上線審查</span><span>·</span><span>CAB1(UT)→ CAB2(PROD)</span>${c&&c.demo?'<span>·</span><span class="demo-tag">示意</span>':''}</div></div></div>
    <div class="context-bar"><span>兩道審查關卡 —— 各自走「提案 → 文件 Review → 審核會議 → 會議記錄」:</span></div>
    <div class="cab-row">${cabCards}</div>`;
}

/* ════ 單一 CAB 關卡(四步 workflow,預設停在「審核會議」)════ */
function viewCab(caseId, cabId, step){
  const c = caseById(caseId); const cab = c.cabs.find(x=>x.id===cabId);
  const p = projectById(c.project_id);
  step = step || "meeting";
  const stepKeys = ["proposal","docs","meeting","minutes"];
  const wf = cab.workflow.map((s,i)=>{
    const k = stepKeys[i];
    return `<span class="wf-step ${k===step?'active':(cab.reviewed?'done':'')}" onclick="viewCab('${caseId}','${cabId}','${k}')"><span class="dot">${cab.reviewed&&k!==step?'✓':i+1}</span>${s}</span>${i<cab.workflow.length-1?'<span class="wf-arrow">›</span>':''}`;
  }).join("");

  let body = "";
  if(step==="proposal") body = stepProposal(c, cab);
  else if(step==="docs") body = stepDocs(c, cab);
  else if(step==="meeting") body = stepMeeting(c, cab);
  else body = stepMinutes(c, cab);

  document.getElementById("view").innerHTML = `
    <div class="crumbs"><a onclick="viewProjects()">專案</a> › <a onclick="viewProject('${c.project_id}')">${esc(p.project_name)}</a> › <b>${cab.name}</b></div>
    <div class="page-head"><div><div class="page-title">${cab.name} <span style="font-size:15px;color:var(--ink-soft)">· ${cab.env} 環境</span></div>
      <div class="page-meta"><span>${esc(p.project_name)}</span><span>·</span><span>${cab.finding_count} 項意見</span>${c.demo?'<span>·</span><span class="demo-tag">示意</span>':''}</div></div>
      ${cab.blockers?`<div style="background:var(--red-bg);color:var(--red);border-radius:20px;padding:8px 16px;font-size:12.5px;font-weight:600">${cab.blockers} blocker 阻擋上線</div>`:''}
    </div>
    <div class="workflow"><span class="wf-label">CAB 流程</span>${wf}</div>
    ${PUBLIC?'<div class="readonly-banner">🔒 公開展示版(唯讀):只顯示彙總與結構,findings 內文、文件名、會議記錄全文僅內部版可見。</div>':''}
    <div>${body}</div>`;
}

function stepProposal(c, cab){
  return `<div class="panel"><div class="panel-head"><span class="ptitle">提案</span><span class="pmeta">${cab.env}</span></div>
    <div class="empty-state">專案團隊就「${esc(c.project_name)}」部署到 <b>${cab.env}</b> 環境提出上線申請。
    本關卡共需 ${(D.departments||[]).map(d=>d.name).join(' / ')} 三個部門審核,審查 ${cab.finding_count} 項意見、${cab.doc_view.length} 份文件。
    ${c.demo?'(示意提案)':''}</div></div>`;
}

function stepDocs(c, cab){
  const rows = cab.doc_view.length ? cab.doc_view.map((d,i)=>`
    <div class="doc-row" onclick="viewDoc('${c.case_id}','${cab.id}',${i})">
      <div class="di">▤</div>
      <div><div style="font-weight:600">${esc(d.doc)}</div><div style="font-size:11px;color:var(--ink-soft)">提交文件 · ${(d.finding_count!=null?d.finding_count:(d.findings?d.findings.length:0))} 項審查意見</div></div>
      <div class="dmeta">${d.blockers?`<span class="sev-chip blocker">${d.blockers} blocker</span>`:''}<span>檢視 →</span></div>
    </div>`).join("") : `<div class="empty-state">此關卡尚無文件審查紀錄。</div>`;
  return `<div class="panel"><div class="panel-head"><span class="ptitle">文件 Review(依文件)</span><span class="pmeta">會議前</span></div>
    <div>${rows}</div></div>
    <div class="empty-state" style="padding:0 2px">每份提交文件由 Agent 對照各部門 rubric 逐條審查;點文件看該文件被指出的所有意見。原始檔 bytes 留在 .runtime/,不進 git。</div>`;
}

function viewDoc(caseId, cabId, docIdx){
  const c = caseById(caseId); const cab = c.cabs.find(x=>x.id===cabId); const d = cab.doc_view[docIdx];
  const p = projectById(c.project_id);
  const fl = (d.findings||[]);
  const body = PUBLIC || !fl.length ? `<div class="empty-state">${PUBLIC?'公開版只顯示此文件有 '+(d.finding_count||0)+' 項意見;內文僅內部版可見。':'此文件無審查意見。'}</div>`
    : fl.map(f=>findingHTML(f, true)).join("");
  document.getElementById("view").innerHTML = `
    <div class="crumbs"><a onclick="viewProjects()">專案</a> › <a onclick="viewProject('${c.project_id}')">${esc(p.project_name)}</a> › <a onclick="viewCab('${caseId}','${cabId}','docs')">${cab.name}</a> › <b>${esc(d.doc)}</b></div>
    <div class="page-head"><div><div class="page-title" style="font-size:22px">${esc(d.doc)}</div>
      <div class="page-meta"><span>${cab.name} · ${cab.env}</span><span>·</span><span>${(d.finding_count!=null?d.finding_count:fl.length)} 項審查意見</span></div></div></div>
    <div class="panel"><div class="panel-head"><span class="ptitle">此文件的審查意見</span><span class="pmeta">finding.schema.json</span></div><div>${body}</div></div>`;
}

function findingHTML(f, showDept){
  const missing = (f.evidence||"").includes("缺證據");
  return `<div class="finding">
    <div class="finding-top"><span class="sev-badge ${f.severity}">${f.severity}</span>
      ${showDept?`<span class="dept-chip">${deptName(f.lens)}</span>`:''}
      <span class="ftitle">${esc(f.title)}</span><span class="fid">${esc(f.id)}</span></div>
    <div class="frationale">${esc(f.rationale)}</div>
    <div class="frec"><b>建議</b> · ${esc(f.recommendation)}</div>
    <div class="evidence ${missing?'missing':''}"><span class="doc">${missing?'⚑ 缺證據':'▣ '+esc(f.source_doc||'來源')}</span><span>${esc(f.evidence)}</span><span class="rubric-ref">${esc(f.rubric_ref)}</span></div>
  </div>`;
}
function deptName(lens){ const d=(D.departments||[]).find(x=>x.lens===lens); return d?d.name:lens; }

/* 審核會議:三部門 Agent 模擬意見 */
function stepMeeting(c, cab){
  const cards = cab.dept_view.map(dv=>{
    const findings = (dv.findings||[]);
    const fl = PUBLIC || !findings.length
      ? `<div class="skeleton-note">${dv.has_rubric ? (PUBLIC? (dv.finding_count||0)+' 項意見(內文僅內部版)' : '本次無意見') : '此部門 rubric 尚未建置(骨架)——Agent 暫不模擬意見。'}</div>`
      : findings.map(f=>`<div class="dept-finding"><span class="sb sev-badge ${f.severity}">${f.severity}</span><div><b>${esc(f.title)}</b><div style="font-size:11px;color:var(--ink-soft);margin-top:2px">${esc(f.recommendation)}</div></div></div>`).join("");
    return `<div class="dept-card">
      <div class="dh"><span class="dname">${dv.name}</span><span class="advice ${VCLASS[dv.advice]}">${VLABEL[dv.advice]}</span></div>
      <div class="dfull">${dv.full}${dv.has_rubric?'':' · 骨架'}</div>
      ${fl}
      <div class="agent-note">🤖 Agent 模擬「${dv.name}」部門視角給意見;真正裁決由該部門代表在會議上決定。</div>
    </div>`;
  }).join("");
  return `<div class="panel"><div class="panel-head"><span class="ptitle">審核會議 — 各部門意見(Agent 模擬)</span><span class="pmeta">Meeting Companion</span></div>
    <div class="empty-state" style="border-bottom:1px solid var(--hairline)">專案團隊在 CAB 會議上報告「${esc(c.project_name)}」上線(${cab.env});風管 / 資安 / 法遵 各給建議與是否通過。<b>Agent 在此先模擬各部門意見,人做最終裁決。</b></div>
    <div style="padding:16px 18px"><div class="dept-grid">${cards}</div></div></div>`;
}

/* 會議記錄(取代簽核;無 merge 按鈕)*/
function stepMinutes(c, cab){
  const decided = c.status==="decided";
  return `<div class="panel"><div class="panel-head"><span class="ptitle">會議記錄 / 裁決</span><span class="pmeta">verdict-policy.md</span></div>
    <div class="minutes">
      <div class="mhead verdict-tag ${VCLASS[cab.verdict]}">本關推薦:${VLABEL[cab.verdict]}</div>
      <div class="mrule">${cab.blockers?`任一部門有 <b>blocker</b> → 推薦 no-go。本關 ${cab.blockers} 個 blocker,須全數解決才放行 ${cab.env}。`:'無 blocker;依各部門 high/medium 意見權衡。'}</div>
      <div class="readonly-banner" style="background:${decided?'var(--green-bg)':'var(--amber-bg)'};color:${decided?'var(--green)':'var(--amber)'}">
        ${decided?'✓ 已於 CAB 會議裁決(此為紀錄)':'⏸ 待 CAB 會議裁決 —— Agent 給推薦,通過與否由會議決定並記入會議記錄'}
      </div>
      <div style="margin-top:6px">
        <a class="minutes-link" href="https://github.com/alexyin2/review-committee-agent-team/pulls" target="_blank">↗ 在 GitHub 看裁決 PR</a>
        <a class="minutes-link" href="#" onclick="return false">↗ 會議記錄(內部)</a>
      </div>
      <div style="margin-top:12px;font-size:11px;color:var(--ink-soft)">說明:此前端為唯讀展示窗,不在此操作裁決。正式裁決發生在 CAB 會議,並由人記入會議記錄 / merge 對應 PR。</div>
    </div></div>`;
}

/* ════ 排程 ════ */
function viewSchedule(){
  setNav("schedule");
  const cards = (D.schedule||[]).map(s=>`
    <div class="sched-card"><div class="si">${s.type==='digest'?'📊':s.type==='feedback-synthesis'?'🧩':s.type==='reminder'?'⏰':'🔍'}</div>
      <div class="sched-main"><div class="st">${esc(s.name)}</div><div class="sd">${esc(s.desc||'')}</div></div>
      <div class="sched-state ${s.status}">${s.status==='implemented'?'已實作':'骨架'}</div></div>`).join("");
  document.getElementById("view").innerHTML = `
    <div class="crumbs">運作 › <b>排程</b></div>
    <div class="page-head"><div><div class="page-title">排程</div>
      <div class="page-meta"><span>桌機本機排程(launchd/cron)把任務丟進同一條 queue,worker 依 type 分派</span></div></div></div>
    <div class="context-bar"><span>所有排程任務與 Slack / 本機觸發 <b>共用同一條 queue</b>。</span></div>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:760px">${cards}</div>`;
}

/* ════ Skills / 腦 ════ */
function viewSkills(){
  setNav("skills");
  const sk = D.skills || {rubrics:[],skills:[],agents:[]};
  const lensHealth = Object.entries(D.lens_health||{}).map(([l,h])=>`<span class="lens-state ${h.produced?'on':'off'}">${l} ${h.produced?'✓':(h.has_rubric===false?'骨架':'—')}</span>`).join(" ");
  const props = D.proposals || []; const fbTotal=(D.feedback_summary&&D.feedback_summary.total)||0;
  const tbl = (rows,label)=>`<div class="panel"><div class="panel-head"><span class="ptitle">${label}</span><span class="pmeta">${rows.length} 個 · 改它走 PR</span></div>
    <table class="skill-table"><thead><tr><th>名稱</th><th>路徑</th><th>最近變更</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td class="sname">${esc(r.name)}</td><td class="spath">${esc(r.path)}</td><td class="schange">${r.last_sha?`<code>${esc(r.last_sha)}</code> · ${esc(r.last_date)} · ${esc(r.last_subject)}`:'—'}</td></tr>`).join("")}
    </tbody></table></div>`;
  const propPanel = `<div class="panel" style="border-color:var(--terracotta-soft)">
    <div class="panel-head"><span class="ptitle">待人覆核的 skill 修改提案</span><span class="pmeta">feedback-synthesis · 需人 merge</span></div>
    ${props.length?`<table class="skill-table"><thead><tr><th>指向 rubric</th><th>來源回饋</th><th>狀態</th></tr></thead><tbody>
      ${props.map(p=>`<tr><td class="sname">${esc(p.target)}</td><td class="schange">${p.feedback_count} 條委員回饋彙整</td><td><span class="sched-state skeleton">待覆核</span></td></tr>`).join("")}
      </tbody></table><div class="empty-state" style="border-top:1px solid var(--hairline)">由排程 agent 從 ${fbTotal} 條 Slack 1:1 回饋彙整;<b style="color:var(--ink)">採納與否由人覆核</b>(開 PR 改 rubric → 委員 merge)。</div>`
    :`<div class="empty-state">目前沒有待覆核提案。委員 Slack 1:1 回饋累積後,排程 feedback-synthesis 會彙整成提案放這。</div>`}</div>`;
  document.getElementById("view").innerHTML = `
    <div class="crumbs">治理 › <b>Skills / 腦</b></div>
    <div class="page-head"><div><div class="page-title">Skills / 腦</div>
      <div class="page-meta"><span>受治理的「腦」:rubric / skill / agent。改它 = 開 PR,merge 後下次跑吃到新版</span></div></div></div>
    <div class="context-bar"><span>各部門 lens 健康度:</span> ${lensHealth} <span>·</span> <span>rubric 近 30 天變更 <b>${(D.summary&&D.summary.rubric_changes_30d)||D.rubric_changes_30d||0}</b></span> <span>·</span> <span>累積回饋 <b>${fbTotal}</b></span></div>
    ${propPanel}
    ${tbl(sk.rubrics||[],"Rubrics(各部門審查準則)")}
    ${tbl(sk.skills||[],"Skills(thin shim)")}
    ${tbl(sk.agents||[],"Agents(system prompt)")}`;
}

/* 導覽 + 入口 */
document.querySelectorAll(".nav-item").forEach(n=>{
  n.onclick=()=>{ const v=n.dataset.view; v==="projects"?viewProjects():v==="schedule"?viewSchedule():viewSkills(); };
});
document.getElementById("nav-open").textContent = D.summary.awaiting || "";
if(PUBLIC) document.getElementById("pub-tag").style.display = "inline-block";

const params = new URLSearchParams(location.search);
if(params.get("cab") && caseById(params.get("case"))) viewCab(params.get("case"), params.get("cab"), params.get("step"));
else if(params.get("case") && caseById(params.get("case"))) { const c=caseById(params.get("case")); viewCab(c.case_id, c.cabs[0].id); }
else if(params.get("project") && projectById(params.get("project"))) viewProject(params.get("project"));
else if(params.get("view")==="schedule") viewSchedule();
else if(params.get("view")==="skills") viewSkills();
else viewProjects();
</script>
</body>
</html>
